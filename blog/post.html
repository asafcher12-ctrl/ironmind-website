<script src="posts.js"></script>
<script>
  const slug = new URLSearchParams(window.location.search).get('slug');
  const post = POSTS.find(p => p.slug === slug);

  if (!post) {
    document.getElementById('heroArea').innerHTML = `
      <div class="blog-hero">
        <h1>הפוסט לא נמצא</h1>
        <p class="blog-hero-sub"><a href="/blog/" style="color:var(--gold)">חזרה לבלוג</a></p>
      </div>`;
  } else {
    // Update page meta
    document.title = post.title + ' | לי-אור';
    document.querySelector('meta[name="description"]')?.remove();
    const metaDesc = document.createElement('meta');
    metaDesc.name = 'description';
    metaDesc.content = post.excerpt;
    document.head.appendChild(metaDesc);

    // JSON-LD
    const ld = document.createElement('script');
    ld.type = 'application/ld+json';
    ld.textContent = JSON.stringify({
      "@context": "https://schema.org",
      "@type": "Article",
      "headline": post.title,
      "description": post.excerpt,
      "datePublished": post.date,
      "dateModified": post.date,
      "author": {"@type": "Organization", "name": "לי-אור"},
      "publisher": {"@type": "Organization", "name": "לי-אור", "url": "https://li-or.co.il"}
    });
    document.head.appendChild(ld);

    // Hero
    document.getElementById('heroArea').innerHTML = `
      <div class="blog-hero">
        <div class="breadcrumb">
          <a href="/">דף הבית</a>
          <span>›</span>
          <a href="/blog/">בלוג</a>
          <span>›</span>
          <span>${post.category}</span>
        </div>
        <div class="blog-hero-tag">${post.category}</div>
        <h1>${post.title}</h1>
        <p class="blog-hero-sub">${post.excerpt}</p>
      </div>`;

    // Article
    document.getElementById('articleArea').innerHTML = `
      <div class="article-wrap">
        <div class="article-meta">
          <span class="meta-tag">${post.category}</span>
          <span class="meta-date">${post.date}</span>
          <span class="meta-read">${post.readTime}</span>
        </div>
        <div class="article-content">${post.content}</div>
        <div class="article-cta">
          <h3>רוצים להתקדם? אנחנו כאן.</h3>
          <p>סיור מדידה חינמי, הצעת מחיר שקופה ומפורטת, אחריות בכתב — בלי הפתעות.</p>
          <div class="cta-btns">
            <a href="/#contact" class="btn-primary">קבל הצעת מחיר חינם</a>
            <a href="https://wa.me/972509734607?text=שלום!%20קראתי%20את%20הבלוג%20ואשמח%20לשמוע%20פרטים" class="btn-outline" target="_blank" rel="noopener">שאל בוואטסאפ</a>
          </div>
        </div>
      </div>`;

    // Related posts
    if (post.related && post.related.length) {
      const relatedPosts = post.related
        .map(s => POSTS.find(p => p.slug === s))
        .filter(Boolean);

      if (relatedPosts.length) {
        document.getElementById('relatedArea').innerHTML = `
          <div class="related-section">
            <h2>מאמרים נוספים שיעניינו אתכם</h2>
            <div class="related-grid">
              ${relatedPosts.map(r => `
                <a href="/blog/${r.slug}" class="related-card">
                  <span class="related-card-tag">${r.category}</span>
                  <h3>${r.title}</h3>
                  <p>${r.excerpt}</p>
                </a>
              `).join('')}
            </div>
          </div>`;
      }
    }
  }
</script>
